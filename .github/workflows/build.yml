name: build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    name: Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore (Core + Tests + Example)
        run: |
          dotnet restore ImageResize.Core/ImageResize.Core.csproj
          dotnet restore ImageResize.Tests/ImageResize.Tests.csproj
          dotnet restore ImageResize.Example/ImageResize.Example.csproj

      - name: Build Core
        run: dotnet build ImageResize.Core/ImageResize.Core.csproj -c Release --no-restore

      - name: Build Example
        run: dotnet build ImageResize.Example/ImageResize.Example.csproj -c Release --no-restore

      - name: Test
        run: dotnet test ImageResize.Tests/ImageResize.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

      - name: Upload NuGet packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: |
            nupkgs/*.nupkg
            nupkgs/*.snupkg

  context-menu:
    name: ContextMenu (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ImageResize.ContextMenu/ImageResize.ContextMenu.csproj

      - name: Build
        run: dotnet build ImageResize.ContextMenu/ImageResize.ContextMenu.csproj -c Release --no-restore
