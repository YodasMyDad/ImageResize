name: release

# Fires on every push to master.
# On each run:
#   - Bumps the minor version in Directory.Build.props (e.g. 3.1.0 -> 3.2.0)
#   - Builds + tests + packs ImageResize.Core (.nupkg + .snupkg)
#   - Builds the ContextMenu installers (x64 + x86)
#   - Pushes the package to nuget.org
#   - Creates a v{version} tag and a GitHub Release with the installers attached
#   - Commits the bumped Directory.Build.props back to master with [skip ci]
#
# Major-version bumps are still manual: edit <Version> in Directory.Build.props
# (e.g. 3.x.0 -> 4.0.0). The workflow only ever touches the minor.
#
# Prerequisites (one-time, in the GitHub UI):
#   1. Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#        Name:  NUGET_API_KEY
#        Value: <API key from nuget.org, scoped to push ImageResize*>
#   2. Repo -> Settings -> Actions -> General -> Workflow permissions
#        "Read and write permissions" must be enabled (so the workflow can push
#        the version-bump commit and create tags/releases).
#   3. master must NOT have a branch-protection rule that blocks direct pushes
#      from GITHUB_TOKEN, otherwise the bump-back commit will fail.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build everything but skip nuget.org push, GitHub Release, and version commit-back'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-library:
    name: Build + test + pack (Core)
    runs-on: ubuntu-latest
    # Skip when the head commit is the workflow's own version-bump commit.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bump minor version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          PROPS=Directory.Build.props
          CURRENT=$(grep -oP '(?<=<Version>)[^<]+' "$PROPS" | head -1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
          NEW_ASSEMBLY="${NEW_VERSION}.0"
          echo "Current version: $CURRENT"
          echo "New version:     $NEW_VERSION"
          sed -i "s|<Version>${CURRENT}</Version>|<Version>${NEW_VERSION}</Version>|" "$PROPS"
          sed -i "s|<AssemblyVersion>${CURRENT}.0</AssemblyVersion>|<AssemblyVersion>${NEW_ASSEMBLY}</AssemblyVersion>|" "$PROPS"
          sed -i "s|<FileVersion>${CURRENT}.0</FileVersion>|<FileVersion>${NEW_ASSEMBLY}</FileVersion>|" "$PROPS"
          sed -i "s|<InformationalVersion>${CURRENT}</InformationalVersion>|<InformationalVersion>${NEW_VERSION}</InformationalVersion>|" "$PROPS"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "--- Directory.Build.props after bump ---"
          cat "$PROPS"

      - name: Upload bumped props
        uses: actions/upload-artifact@v4
        with:
          name: bumped-props
          path: Directory.Build.props

      - name: Build Core
        run: dotnet build ImageResize.Core/ImageResize.Core.csproj -c Release

      - name: Test
        run: dotnet test ImageResize.Tests/ImageResize.Tests.csproj -c Release

      - name: Upload nupkgs
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*

  build-installer:
    name: Build ContextMenu installer (windows)
    runs-on: windows-latest
    needs: build-library
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore bumped Directory.Build.props
        uses: actions/download-artifact@v4
        with:
          name: bumped-props
          path: .

      - name: Restore nupkgs (needed by ContextMenu's nuget.config local source)
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build + sign installers
        shell: pwsh
        run: ./build-installer.ps1 -Platform Both -Configuration Release

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: publish/installer/*.exe

  build-dmg:
    name: Build ContextMenu DMG (macos)
    runs-on: macos-latest
    needs: build-library
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore bumped Directory.Build.props
        uses: actions/download-artifact@v4
        with:
          name: bumped-props
          path: .

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build universal .app + .dmg
        run: ./build-macos.sh Release

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: publish/installer/*.dmg

  publish:
    name: Publish to nuget.org + GitHub Release
    runs-on: ubuntu-latest
    needs: [build-library, build-installer, build-dmg]
    if: ${{ inputs.dry_run != true }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: installers
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: dmg
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: bumped-props
          path: .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Push to nuget.org
        run: |
          dotnet nuget push "release/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "release/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: List release assets
        run: ls -la release/

      - name: Commit + tag bumped version
        env:
          VERSION: ${{ needs.build-library.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "Release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin master --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-library.outputs.version }}
          name: v${{ needs.build-library.outputs.version }}
          files: |
            release/ImageResize.*.nupkg
            release/ImageResize.*.snupkg
            release/ImageResize-ContextMenu-Setup-*.exe
            release/ImageResize-ContextMenu-Setup-*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build-library.outputs.version, '-') }}
