name: release

# Fires when you push a tag matching v*.*.* (e.g. v3.1.0).
# Produces:
#   - ImageResize.<ver>.nupkg + .snupkg published to nuget.org
#   - ImageResize-ContextMenu-Setup-<ver>-x64.exe and -x86.exe attached to a GitHub Release
#
# Prerequisites (one-time, done in the GitHub UI):
#   1. Repo → Settings → Secrets and variables → Actions → New repository secret
#        Name:  NUGET_API_KEY
#        Value: <API key from nuget.org, scoped to push ImageResize*>
#   2. Nothing else — the workflow grants itself `contents: write` below, so it can
#      create the release without changing your repo-wide Actions permissions.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build everything but skip nuget.org push and release creation'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-library:
    name: Build + test + pack (Core)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Verify tag version matches Directory.Build.props
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROP_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1)
          if [[ "$TAG_VERSION" != "$PROP_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match <Version>$PROP_VERSION</Version> in Directory.Build.props"
            exit 1
          fi

      - name: Build Core
        run: dotnet build ImageResize.Core/ImageResize.Core.csproj -c Release

      - name: Test
        run: dotnet test ImageResize.Tests/ImageResize.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Upload nupkgs
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*

  build-installer:
    name: Build ContextMenu installer (windows)
    runs-on: windows-latest
    needs: build-library
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build + sign installers
        shell: pwsh
        run: ./build-installer.ps1 -Platform Both -Configuration Release

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: publish/installer/*.exe

  publish:
    name: Publish to nuget.org + GitHub Release
    runs-on: ubuntu-latest
    needs: [build-library, build-installer]
    if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: installers
          path: release/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Push to nuget.org
        run: |
          dotnet nuget push "release/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "release/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: List release assets
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ImageResize.*.nupkg
            release/ImageResize.*.snupkg
            release/ImageResize-ContextMenu-Setup-*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build-library.outputs.version, '-') }}
